<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="شموس"><meta name="mobile-web-app-capable" content="yes"><meta name="theme-color" content="#102d2c"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="assets/shumoos-logo.png"><title>تسجيل الدخول | شموس</title><link rel="stylesheet" href="styles.css"></head>
<body class="auth-page">
  <a class="brand auth-brand" href="index.html"><span class="brand-mark">شموس</span><span>شموس<small>SHUMOOS ELEVATORS</small></span></a>
  <main class="auth-shell">
    <section class="auth-panel art-panel"><div><span class="eyebrow">مرحبًا بعودتك</span><h1>أعمالك تتحرك<br><em>بانسيابية.</em></h1><p>تابع فريقك وعقودك وزياراتك من مكان واحد، أينما كنت.</p></div></section>
    <section class="auth-panel form-panel">
      <div class="auth-form"><span class="eyebrow">تسجيل الدخول</span><h2>أهلًا بك مجددًا</h2><p>أدخل بياناتك للوصول إلى لوحة التحكم.</p>
        <form id="loginForm">
          <label>رقم الهوية / الإقامة<input name="id" inputmode="numeric" placeholder="أدخل رقم الهوية أو الإقامة" required></label>
          <label>كلمة المرور<div class="password"><input name="password" type="password" placeholder="••••••••" required><button type="button" class="show-pass">إظهار</button></div></label>
          <div class="form-row"><label class="check"><input type="checkbox"> تذكرني</label><a href="#" id="forgotPasswordLink">نسيت كلمة المرور؟</a></div>
          <div id="loginMsg" style="color:#c33;font-size:13px;margin-bottom:8px;display:none"></div>
          <button class="btn primary full" type="submit" id="loginBtn">تسجيل الدخول ←</button>
        </form>
        <p class="auth-switch">ليس لديك حساب؟ <a href="register.html">أنشئ حسابًا جديدًا</a></p>
      </div>
    </section>
  </main>
  <script>
    (function(){
      function cleanId(v){return String(v||"").replace(/[٠-٩]/g,d=>"٠١٢٣٤٥٦٧٨٩".indexOf(d)).replace(/[۰-۹]/g,d=>"۰۱۲۳۴۵۶۷۸۹".indexOf(d)).replace(/\D/g,"")}
      const blockedIds=["0000000000","1111111111","3333333333"];function isValidId(v){const c=cleanId(v);return c.length>=6&&!blockedIds.includes(c)&&/^[12]/.test(c)}
      const systemUsers=[{id:"2572280689",password:"qazdrujmlp@2A",role:"admin",name:"عبد الرحمن أزهري",permissions:["*"]},{id:"2233556688",password:"2233556688",role:"company_admin",name:"باسم",permissions:["*"],mustChangePassword:true},{id:"1010389102",password:"1010389102",role:"owner",name:"سليمان الهلالي",permissions:["*"],mustChangePassword:true,companyOwnerId:"1010389102"}];
      function localLogin(id,pwd){return systemUsers.find(x=>cleanId(x.id)===cleanId(id)&&x.password===pwd)||null}
      document.querySelectorAll(".show-pass").forEach(b=>{b.onclick=()=>{const i=b.previousElementSibling;i.type=i.type==="password"?"text":"password";b.textContent=i.type==="password"?"إظهار":"إخفاء"}});
      const form=document.getElementById("loginForm"),btn=document.getElementById("loginBtn"),msg=document.getElementById("loginMsg");
      form.addEventListener("submit",async e=>{e.preventDefault();msg.style.display="none";btn.disabled=true;btn.textContent="جاري تسجيل الدخول...";const id=cleanId(new FormData(form).get("id")),pwd=form.querySelector("[name=password]").value;if(!isValidId(id)){msg.textContent="رقم الهوية غير صالح. يجب أن يبدأ بـ 1 أو 2 وألا يكون 0000000000 أو 1111111111 أو 3333333333.";msg.style.display="block";btn.disabled=false;btn.textContent="تسجيل الدخول ←";return}if(!id||!pwd){msg.textContent="يرجى إدخال رقم الهوية وكلمة المرور";msg.style.display="block";btn.disabled=false;btn.textContent="تسجيل الدخول ←";return}let j=null;try{const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:id,password:pwd})});if(r.ok){j=await r.json()}else{if(r.status!==404){const ej=await r.json().catch(()=>({}));msg.textContent=ej.error||"رقم الهوية أو كلمة المرور غير صحيحة";msg.style.display="block";btn.disabled=false;btn.textContent="تسجيل الدخول ←";return}}}catch{}if(!j){const lu=localLogin(id,pwd);if(!lu){msg.textContent="رقم الهوية أو كلمة المرور غير صحيحة";msg.style.display="block";btn.disabled=false;btn.textContent="تسجيل الدخول ←";return}j={id:lu.id,role:lu.role,name:lu.name,permissions:lu.permissions||[],mustChangePassword:!!lu.mustChangePassword,companyOwnerId:lu.companyOwnerId||"",_linkedCoId:""}}const session={id:j.id,role:j.role,name:j.name,permissions:j.permissions||[],companyOwnerId:j.role==="owner"?j.id:"",adminMode:j.role==="admin"?"company":"",_linkedCoId:j._linkedCoId||""};if(j.mustChangePassword){showChangePwd(j,session);return}localStorage.setItem("misadSession",JSON.stringify(session));location.href="dashboard.html"});
      function showChangePwd(u,session){const o=document.createElement("div");o.style.cssText="position:fixed;inset:0;background:#102d2c99;z-index:999;display:grid;place-items:center;overflow-y:auto;padding:20px";o.innerHTML='<div style="background:#fff;border-radius:16px;padding:32px;max-width:420px;width:100%;box-shadow:0 20px 60px #0003;font-family:Cairo,sans-serif;margin:auto"><h2 style="margin:0 0 6px;color:#18302f;text-align:center">أول تسجيل دخول</h2><p style="color:#748481;margin:0 0 20px;text-align:center;font-size:14px">يرجى تغيير كلمة المرور للمتابعة.</p><form id="firstPwdForm"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:4px">كلمة المرور الجديدة<div class="password"><input name="newPassword" type="password" minlength=6 required style="width:100%;padding:10px 12px;border:1px solid #e2e8e5;border-radius:9px;margin-top:4px"><button type="button" class="show-pass" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);border:0;background:none;color:#748481;cursor:pointer;font-size:12px">إظهار</button></div></label><label style="display:block;font-size:13px;font-weight:600;margin:12px 0 4px">تأكيد كلمة المرور<input name="confirmPassword" type="password" minlength=6 required style="width:100%;padding:10px 12px;border:1px solid #e2e8e5;border-radius:9px;margin-top:4px"></label><div id="pwdMsg" style="margin:8px 0;font-size:13px;color:#c33"></div><button type="submit" style="width:100%;padding:12px;border:0;border-radius:9px;background:#c9964b;color:#fff;font-weight:700;cursor:pointer;margin-top:8px">حفظ ومتابعة</button></form></div>';document.body.appendChild(o);const ff=o.querySelector("#firstPwdForm"),pwMsg=o.querySelector("#pwdMsg");ff.addEventListener("submit",async function(ev){ev.preventDefault();const fd=new FormData(this),np=fd.get("newPassword"),cp=fd.get("confirmPassword");if(np!==cp){pwMsg.textContent="كلمتا المرور غير متطابقتين";return}if(String(np||"").length<6){pwMsg.textContent="كلمة المرور يجب أن تكون 6 أحرف على الأقل";return}try{const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:u.id,password:pwd})});if(!r.ok){pwMsg.textContent="انتهت الجلسة، حاول تسجيل الدخول مرة أخرى";return}}catch{}sessionStorage.setItem("misadNewPwd",JSON.stringify({id:u.id,password:np}));session.name=u.name;session.id=u.id;session.role=u.role;localStorage.setItem("misadSession",JSON.stringify(session));const users=JSON.parse(localStorage.getItem("misadUsers")||"[]");const existing=users.find(x=>cleanId(x.id)===cleanId(u.id));if(existing){existing.password=np;existing.mustChangePassword=false}else{users.unshift({id:u.id,password:np,role:u.role,name:u.name,permissions:u.permissions||[],mustChangePassword:false,companyOwnerId:u.companyOwnerId||""})}localStorage.setItem("misadUsers",JSON.stringify(users));try{fetch("/api/storage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:"misadUsers",value:JSON.stringify(users)})})}catch{}o.remove();location.href="dashboard.html"});document.querySelectorAll(".show-pass",o).forEach(b=>{b.onclick=()=>{const i=b.previousElementSibling;i.type=i.type==="password"?"text":"password";b.textContent=i.type==="password"?"إظهار":"إخفاء"}})}
      document.getElementById("forgotPasswordLink")?.addEventListener("click",e=>{e.preventDefault();const o=document.createElement("div");o.style.cssText="position:fixed;inset:0;background:#102d2c99;z-index:999;display:grid;place-items:center";o.innerHTML='<div style="background:#fff;border-radius:16px;padding:32px;max-width:420px;width:90%;box-shadow:0 20px 60px #0003;font-family:Cairo,sans-serif"><h2 style="margin:0 0 6px;color:#18302f">استعادة كلمة المرور</h2><p style="color:#748481;margin:0 0 20px;font-size:14px">أدخل رقم هويتك وكلمة مرور جديدة.</p><form id="resetPwdForm"><label style="display:block;font-size:13px;font-weight:600;margin-bottom:4px">رقم الهوية<input name="userId" inputmode="numeric" required style="width:100%;padding:10px 12px;border:1px solid #e2e8e5;border-radius:9px;margin-top:4px"></label><label style="display:block;font-size:13px;font-weight:600;margin:16px 0 4px">كلمة المرور الجديدة<div class="password"><input name="newPassword" type="password" minlength=6 required style="width:100%;padding:10px 12px;border:1px solid #e2e8e5;border-radius:9px"><button type="button" class="show-pass" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);border:0;background:none;color:#748481;cursor:pointer;font-size:12px">إظهار</button></div></label><label style="display:block;font-size:13px;font-weight:600;margin:16px 0 4px">تأكيد كلمة المرور<input name="confirmPassword" type="password" minlength=6 required style="width:100%;padding:10px 12px;border:1px solid #e2e8e5;border-radius:9px;margin-top:4px"></label><div id="resetPwdMsg" style="margin:8px 0;font-size:13px"></div><button type="submit" style="width:100%;padding:12px;border:0;border-radius:9px;background:#c9964b;color:#fff;font-weight:700;cursor:pointer;margin-top:8px">استعادة</button></form></div>';document.body.appendChild(o);const rf=o.querySelector("#resetPwdForm");rf?.addEventListener("submit",async function(ev){ev.preventDefault();const fd=new FormData(this),uid=cleanId(fd.get("userId")),np=fd.get("newPassword"),cp=fd.get("confirmPassword");const rMsg=this.querySelector("#resetPwdMsg");if(!isValidId(uid)){rMsg.textContent="رقم الهوية غير صالح.";return}if(np!==cp){rMsg.textContent="كلمتا المرور غير متطابقتين";return}if(String(np||"").length<6){rMsg.textContent="كلمة المرور يجب أن تكون 6 أحرف على الأقل";return}try{const r=await fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({userId:uid,password:np})});if(r.ok){localStorage.setItem("misadSession",JSON.stringify({id:uid,role:"",name:"",permissions:[]}));const users=JSON.parse(localStorage.getItem("misadUsers")||"[]");const ex=users.find(x=>cleanId(x.id)===uid);if(ex){ex.password=np}else{users.unshift({id:uid,password:np,role:"",name:"",mustChangePassword:false})}localStorage.setItem("misadUsers",JSON.stringify(users));try{fetch("/api/storage",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({key:"misadUsers",value:JSON.stringify(users)})})}catch{}o.remove();location.href="dashboard.html"}else{rMsg.textContent="رقم الهوية غير صحيح أو لا يمكن تحديث كلمة المرور حالياً"}}catch{rMsg.textContent="حدث خطأ في الاتصال"}})})
    })();
  </script>
