<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="شموس">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#102d2c">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:; media-src * data: blob:; frame-src *;">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="mobile.css">
  <title>شموس</title>
</head>
<body>
  <main class="mobile-shell" id="app">
    <section class="setup-panel" id="setupPanel" aria-label="إعداد رابط التطبيق">
      <div class="brand">
        <div class="brand-logo" aria-hidden="true">ش</div>
        <div>
          <h1>شموس</h1>
          <p>تشغيل النظام على الآيفون</p>
        </div>
      </div>

      <form class="setup-form" id="urlForm">
        <label for="serverUrl">رابط النظام</label>
        <div class="url-field">
          <input id="serverUrl" name="serverUrl" type="url" inputmode="url" dir="ltr" autocomplete="url" placeholder="https://example.com" required>
          <button type="submit">دخول</button>
        </div>
        <p class="hint">يظهر هذا الحقل في أول تشغيل فقط، وبعد حفظ الرابط يفتح التطبيق مباشرة.</p>
        <p class="error" id="urlError" role="alert"></p>
      </form>
    </section>

    <div class="app-view" id="appView" aria-live="polite">
      <button class="settings-button" id="settingsButton" type="button" title="تغيير الرابط" aria-label="تغيير الرابط">URL</button>
      <iframe id="appFrame" src="about:blank" allow="microphone;camera;geolocation;fullscreen"></iframe>
    </div>
  </main>
  <script type="module" src="mobile.js"></script>
</body>
</html>
