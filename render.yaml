services:
  - type: web
    name: ertiqaa
    runtime: node
    repo: https://github.com/azhryb824-sys/Ertiqaa
    buildCommand: npm install
    startCommand: node server.cjs
    # CRITICAL: This persistent disk stores all users, passwords, contracts,
    # quotes, documents, and customer data. Do not remove or change it in future edits.
    disk:
      name: ertiqaa-secure-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: STORAGE_PATH
        value: /var/data/storage.json
      - key: AI_BACKUP_RETENTION_DAYS
        value: "365"
      - key: AI_BACKUP_INTERVAL_MINUTES
        value: "60"
      - key: SECRET_ENTRY_TOKEN
        generateValue: true
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ALLOW_PAID_VOICE
        value: "1"
      - key: VOICE_CLONE_TIMEOUT_MS
        value: "60000"
      - key: JAMEEL_VOICE_ENDPOINT
        value: https://sd-ai.onrender.com
      - key: JAMEEL_VOICE_TIMEOUT_MS
        value: "120000"
      - key: AI_INTERNET_ENABLED
        value: "0"
      - key: AI_INTERNET_REFRESH_HOURS
        value: "24"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: AI_MODEL_TIMEOUT_MS
        value: "15000"
