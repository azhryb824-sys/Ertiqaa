services:
  - type: web
    name: ertiqaa
    runtime: node
    repo: https://github.com/azhryb824-sys/Ertiqaa
    buildCommand: npm install
    startCommand: node server.cjs
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: SECRET_ENTRY_TOKEN
        generateValue: true
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: AI_INTERNET_ENABLED
        value: "0"
      - key: AI_INTERNET_REFRESH_HOURS
        value: "24"
