<!doctype html>
<html lang="ar" dir="rtl">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>حساب جديد | شموس</title><link rel="stylesheet" href="styles.css"></head>
<body class="auth-page">
  <a class="brand auth-brand" href="index.html"><span class="brand-mark">شموس</span><span>شموس<small>SHUMOOS ELEVATORS</small></span></a>
  <main class="auth-shell register-shell">
    <section class="auth-panel art-panel"><div><span class="eyebrow">خطوتك الأولى</span><h1>ابدأ إدارة<br><em>أكثر ذكاءً.</em></h1><p>حساب واحد يربط المنشآت والفنيين والعملاء في منظومة متكاملة.</p></div><ul class="benefits"><li>✓ تفعيل فوري للحساب</li><li>✓ صلاحيات دقيقة لكل دور</li><li>✓ بياناتك محفوظة بأمان</li></ul></section>
    <section class="auth-panel form-panel">
      <div class="auth-form"><span class="eyebrow">حساب جديد</span><h2>أنشئ حسابك</h2><p>املأ البيانات التالية للانضمام إلى شموس.</p>
        <form id="registerForm">
          <label>الاسم الكامل<input name="name" placeholder="الاسم كما يظهر في الهوية" required></label>
          <label>رقم الهوية / الإقامة<input name="id" inputmode="numeric" pattern="[0-9]{10}" maxlength="10" placeholder="10 أرقام" required></label>
          <label>الدور<select name="role" required><option value="">اختر دور المستخدم</option><option value="owner">مالك شركة / مؤسسة</option><option value="company_admin">إداري الشركة</option><option value="technician">فني / مهندس</option><option value="client">عميل</option></select></label>
          <div class="two-fields"><label>كلمة المرور<input name="password" type="password" minlength="8" placeholder="8 أحرف على الأقل" required></label><label>تأكيد كلمة المرور<input name="confirm" type="password" placeholder="أعد كتابة كلمة المرور" required></label></div>
          <label class="check"><input name="terms" type="checkbox" required> أوافق على <a href="#">الشروط والأحكام</a> و<a href="#">سياسة الخصوصية</a></label>
          <button class="btn primary full" type="submit">إنشاء الحساب ←</button>
        </form>
        <p class="auth-switch">لديك حساب بالفعل؟ <a href="login.html">سجّل الدخول</a></p>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
